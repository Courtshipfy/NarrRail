meta:
  schemaVersion: 1
  storyId: affinity_demo
  entryNodeId: N_Start

variables:
  - name: Affinity
    type: Int
    scope: Session
    defaultValue: "0"

nodes:
  # 开场对话
  - nodeId: N_Start
    nodeType: Dialogue
    dialogue:
      speakerId: A
      textKey: "你好，B！今天天气真不错。"
      speechRate: 1.0
      voiceAsset: ""
    choices: []
    jumpTargetNodeId: ""
    enterActions: []
    exitActions: []

  - nodeId: N_B_Reply1
    nodeType: Dialogue
    dialogue:
      speakerId: B
      textKey: "你好，A。是啊，天气很好。"
      speechRate: 1.0
      voiceAsset: ""
    choices: []
    jumpTargetNodeId: ""
    enterActions: []
    exitActions: []

  - nodeId: N_A_Question
    nodeType: Dialogue
    dialogue:
      speakerId: A
      textKey: "要不要一起去散步？"
      speechRate: 1.0
      voiceAsset: ""
    choices: []
    jumpTargetNodeId: ""
    enterActions: []
    exitActions: []

  # 选项节点
  - nodeId: N_B_Choice
    nodeType: Choice
    dialogue: {}
    choices:
      - textKey: "好啊，我很乐意！"
        targetNodeId: N_A_Happy
        availability:
          logic: All
          terms: []
      - textKey: "不了，我还有事。"
        targetNodeId: N_A_Sad
        availability:
          logic: All
          terms: []
    jumpTargetNodeId: ""
    enterActions: []
    exitActions: []

  # 选择"好啊"的分支（好感度+10）
  - nodeId: N_A_Happy
    nodeType: Dialogue
    dialogue:
      speakerId: A
      textKey: "太好了！我很高兴你愿意和我一起。"
      speechRate: 1.0
      voiceAsset: ""
    choices: []
    jumpTargetNodeId: ""
    enterActions:
      - actionType: Add
        variable:
          name: Affinity
          type: Int
          scope: Session
        value: "10"
        eventId: ""
    exitActions: []

  # 选择"不了"的分支（好感度-5）
  - nodeId: N_A_Sad
    nodeType: Dialogue
    dialogue:
      speakerId: A
      textKey: "好吧...那下次再约吧。"
      speechRate: 1.0
      voiceAsset: ""
    choices: []
    jumpTargetNodeId: ""
    enterActions:
      - actionType: Add
        variable:
          name: Affinity
          type: Int
          scope: Session
        value: "-5"
        eventId: ""
    exitActions: []

  # 特殊结局（好感度>=10）
  - nodeId: N_A_SpecialEnding
    nodeType: Dialogue
    dialogue:
      speakerId: A
      textKey: "和你在一起真开心！我们以后要经常见面。"
      speechRate: 1.0
      voiceAsset: ""
    choices: []
    jumpTargetNodeId: ""
    enterActions: []
    exitActions: []

  # 普通结局（好感度<10）
  - nodeId: N_A_NormalEnding
    nodeType: Dialogue
    dialogue:
      speakerId: A
      textKey: "那我先走了，再见。"
      speechRate: 1.0
      voiceAsset: ""
    choices: []
    jumpTargetNodeId: ""
    enterActions: []
    exitActions: []

  # 结束节点
  - nodeId: N_End
    nodeType: End
    dialogue: {}
    choices: []
    jumpTargetNodeId: ""
    enterActions: []
    exitActions: []

edges:
  # 线性对话流程
  - sourceNodeId: N_Start
    targetNodeId: N_B_Reply1
    priority: 0
    condition:
      logic: All
      terms: []

  - sourceNodeId: N_B_Reply1
    targetNodeId: N_A_Question
    priority: 0
    condition:
      logic: All
      terms: []

  - sourceNodeId: N_A_Question
    targetNodeId: N_B_Choice
    priority: 0
    condition:
      logic: All
      terms: []

  # 从 A_Happy 根据好感度分支
  - sourceNodeId: N_A_Happy
    targetNodeId: N_A_SpecialEnding
    priority: 0
    condition:
      logic: All
      terms:
        - variable:
            name: Affinity
            type: Int
            scope: Session
          operator: ">="
          compareValue: "10"

  - sourceNodeId: N_A_Happy
    targetNodeId: N_A_NormalEnding
    priority: 1
    condition:
      logic: All
      terms:
        - variable:
            name: Affinity
            type: Int
            scope: Session
          operator: "<"
          compareValue: "10"

  # 从 A_Sad 直接到普通结局
  - sourceNodeId: N_A_Sad
    targetNodeId: N_A_NormalEnding
    priority: 0
    condition:
      logic: All
      terms: []

  # 两个结局都通向 End
  - sourceNodeId: N_A_SpecialEnding
    targetNodeId: N_End
    priority: 0
    condition:
      logic: All
      terms: []

  - sourceNodeId: N_A_NormalEnding
    targetNodeId: N_End
    priority: 0
    condition:
      logic: All
      terms: []
